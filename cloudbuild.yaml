steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/container-scanner:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/container-scanner:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/container-scanner:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=deploy/'
      - '--image=gcr.io/$PROJECT_ID/container-scanner:$SHORT_SHA'
      - '--location=us-central1'

images:
  - 'gcr.io/$PROJECT_ID/container-scanner:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/container-scanner:latest'

substitutions:
  _CLOUD_RUN_SERVICE_NAME: 'container-scanner'

timeout: '3600s'
